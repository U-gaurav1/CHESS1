<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird by GauravU</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #4facfe, #00f2fe);
    }

    canvas {
      display: block;
      margin: auto;
      background: transparent;
    }

    #scoreBoard {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 5px #000;
    }

    #gameOver {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 32px;
      color: white;
      font-weight: bold;
      display: none;
    }

    #restartBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ff4757;
      color: white;
      cursor: pointer;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      transition: 0.2s;
    }
    #restartBtn:hover {
      background: #e84118;
    }

    #credit {
      position: absolute;
      bottom: 10px;
      right: 20px;
      font-size: 14px;
      color: white;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="scoreBoard">Score: 0</div>
  <canvas id="gameCanvas"></canvas>
  <div id="gameOver">
    <p>Game Over!</p>
    <p>Your Score: <span id="finalScore"></span></p>
    <button id="restartBtn">Restart</button>
  </div>
  <div id="credit">Made with ❤ by GauravU</div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 400;
    canvas.height = 600;

    let frames = 0;
    const DEGREE = Math.PI / 180;

    // Bird
    const bird = {
      x: 50,
      y: 150,
      width: 30,
      height: 30,
      gravity: 0.15,
      jump: 4.5,
      speed: 0,
      rotation: 0,
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.ellipse(0, 0, this.width / 2, this.height / 2, 0, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(5, -5, 3, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
      },
      flap() {
        this.speed = -this.jump;
      },
      update() {
        this.speed += this.gravity;
        this.y += this.speed;

        if (this.y + this.height / 2 >= canvas.height - 50) {
          this.y = canvas.height - 50 - this.height / 2;
          gameOver = true;
        }

        this.rotation = this.speed >= 0 ? 25 * DEGREE : -25 * DEGREE;
      },
      reset() {
        this.y = 150;
        this.speed = 0;
      }
    };

    // Pipes
    const pipes = [];
    const pipeGap = 120;
    const pipeWidth = 50;
    let pipeFrequency = 100;

    function drawPipes() {
      for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
      }
    }

    function updatePipes() {
      if (frames % pipeFrequency === 0) {
        let top = Math.random() * (canvas.height / 2);
        let bottom = canvas.height - top - pipeGap;
        pipes.push({ x: canvas.width, top: top, bottom: bottom });
      }

      for (let i = 0; i < pipes.length; i++) {
        pipes[i].x -= 2;

        // Collision
        if (
          bird.x + bird.width / 2 > pipes[i].x &&
          bird.x - bird.width / 2 < pipes[i].x + pipeWidth &&
          (bird.y - bird.height / 2 < pipes[i].top ||
            bird.y + bird.height / 2 > canvas.height - pipes[i].bottom)
        ) {
          gameOver = true;
        }

        // Score
        if (pipes[i].x + pipeWidth === bird.x) {
          score++;
          document.getElementById("scoreBoard").innerText = "Score: " + score;
        }

        // Remove off-screen pipes
        if (pipes[i].x + pipeWidth < 0) {
          pipes.shift();
          i--;
        }
      }
    }

    // Ground
    function drawGround() {
      ctx.fillStyle = "#d35400";
      ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    }

    // Score
    let score = 0;

    // Game Control
    let gameOver = false;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPipes();
      drawGround();
      bird.draw();
    }

    function update() {
      bird.update();
      updatePipes();
    }

    function loop() {
      if (!gameOver) {
        update();
        draw();
        frames++;
        requestAnimationFrame(loop);
      } else {
        document.getElementById("finalScore").innerText = score;
        document.getElementById("gameOver").style.display = "block";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") bird.flap();
    });
    canvas.addEventListener("click", () => bird.flap());

    document.getElementById("restartBtn").addEventListener("click", () => {
      bird.reset();
      pipes.length = 0;
      score = 0;
      document.getElementById("scoreBoard").innerText = "Score: 0";
      document.getElementById("gameOver").style.display = "none";
      gameOver = false;
      frames = 0;
      loop();
    });

    loop();
  </script>
</body>
</html>
