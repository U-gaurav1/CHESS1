<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Advanced Chess — Smooth (2P) — GauravU</title>
<style>
  :root{
    --bg:#0b1220; --panel:#0f1720; --accent:#ff5252;
    --light:#f2d2a9; --dark:#b27a56;
    --tile:min(13.2vw,82px);
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; margin:0; background: radial-gradient(800px 600px at 80% -20%, #071018 0%, #07121b 40%, #041018 100%); color:#e9eef3; font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial}
  .wrap{min-height:100vh; display:flex; flex-direction:column; align-items:center; gap:14px; padding:18px;}
  header{ width:100%; max-width:980px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .brand{ font-weight:800; letter-spacing:.5px; font-size:18px; }
  .controls{ display:flex; gap:10px; align-items:center; }
  button{ background:linear-gradient(180deg,#131a23,#0e141a); border:1px solid rgba(255,255,255,.04); color:#e9eef3; padding:10px 12px; border-radius:10px; cursor:pointer; font-weight:700; box-shadow:0 8px 20px rgba(0,0,0,.45); }
  button:active{ transform:translateY(1px); }
  #status{ padding:8px 12px; background:rgba(255,255,255,.03); border-radius:10px; border:1px solid rgba(255,255,255,.03); font-weight:700; font-size:14px; }

  /* board */
  .board-wrap{ width:calc(var(--tile)*8); max-width:100%; border-radius:18px; box-shadow:0 28px 80px rgba(0,0,0,.6); position:relative; }
  .board{ width:100%; padding-bottom:100%; position:relative; border-radius:14px; overflow:visible; background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)); }
  .sq-grid{ position:absolute; inset:0; display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr); pointer-events:auto; }
  .sq{ position:relative; display:flex; align-items:center; justify-content:center; user-select:none; }
  .sq.light{ background:linear-gradient(180deg,#fbecd3,var(--light)); }
  .sq.dark{ background:linear-gradient(180deg,#cba67b,var(--dark)); }
  .label{ position:absolute; font-weight:800; font-size:10px; color:rgba(0,0,0,.36); pointer-events:none; }
  .label.rank{ left:8px; top:6px; } .label.file{ right:8px; bottom:6px; }

  /* pieces layer: absolute positioned pieces for transforms */
  .pieces-layer{ position:absolute; inset:0; pointer-events:none; z-index:6; }
  .piece{
    position:absolute; display:flex; align-items:center; justify-content:center; border-radius:10px;
    width:calc(var(--tile)*0.9); height:calc(var(--tile)*0.9); font-size:calc(var(--tile)*0.68); user-select:none;
    transform-origin:center center; transition: transform .22s cubic-bezier(.2,.9,.2,1), opacity .14s linear;
    will-change: transform, opacity; pointer-events:auto; box-shadow:0 10px 28px rgba(0,0,0,.45);
  }
  .piece.white{ background:linear-gradient(180deg,#ffffff,#f0f0f0); color:#071017; -webkit-text-stroke:1px rgba(0,0,0,.06); }
  .piece.black{ background:linear-gradient(180deg,#081226,#0f1730); color:#e7f0fb; -webkit-text-stroke:1px rgba(255,255,255,.02); }

  /* hover / selection */
  .sq.sel{ outline:3px solid var(--accent); outline-offset:-6px; box-shadow:0 8px 30px rgba(0,0,0,.36); }
  .sq.hint::after{ content:""; position:absolute; width:18%; height:18%; border-radius:50%; background:rgba(45,212,191,.92); box-shadow:0 0 0 6px rgba(45,212,191,.16); }
  .sq.capture::after{ content:""; position:absolute; width:76%; height:76%; border-radius:14px; border:4px solid rgba(239,68,68,.92); box-shadow:0 0 0 6px rgba(239,68,68,.12); }
  .sq.last-move{ box-shadow: inset 0 0 0 4px rgba(255,225,120,.06) }

  /* promotion modal */
  .modal{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:120; pointer-events:none; }
  .modal.open{ display:flex; pointer-events:auto; }
  .modal-card{ background:linear-gradient(180deg,#071428,#071026); padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,.04); width:min(92vw,360px); text-align:center; box-shadow:0 18px 48px rgba(0,0,0,.6); color:#eaf0f8; }
  .promo-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:8px; }
  .promo-btn{ background:linear-gradient(180deg,#0f1a2a,#08101a); padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,.03); cursor:pointer; font-size:28px; color:inherit; }

  /* win popup */
  .win-modal .modal-card{ padding:18px; text-align:center; }
  .win-title{ font-size:22px; font-weight:900; margin:0 0 6px 0; }
  .win-sub{ opacity:.92; margin-bottom:12px; }

  /* confetti */
  .confetti{ position:absolute; inset:0; pointer-events:none; z-index:160; overflow:hidden; font-size:16px; }

  /* credit */
  .credit{ position:fixed; right:10px; bottom:10px; font-weight:700; color:rgba(255,255,255,.86); z-index:300; display:flex; align-items:center; gap:8px; font-size:13px; }
  .credit .heart{ color:#ff5252 }

  @media (max-width:480px){
    :root{ --tile:calc(100vw / 8); }
    .piece{ font-size:calc(var(--tile)*0.62) }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">♟ Advanced Chess — Refined (2P)</div>
      <div class="controls">
        <button id="undoBtn">Undo</button>
        <button id="restartBtn">Restart</button>
        <div id="status">White to move</div>
      </div>
    </header>

    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board">
        <div class="sq-grid" id="sqGrid" aria-hidden="false"></div>
        <div class="pieces-layer" id="piecesLayer" aria-hidden="false"></div>
        <div class="confetti" id="confetti"></div>
      </div>
    </div>
  </div>

  <!-- Promotion modal -->
  <div class="modal" id="promoModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div style="font-weight:900; margin-bottom:6px">Promote pawn</div>
      <div class="promo-grid" id="promoGrid"></div>
      <div style="font-size:13px; opacity:.85; margin-top:8px">Choose a piece to promote to</div>
    </div>
  </div>

  <!-- Win modal -->
  <div class="modal win-modal" id="winModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="win-title" id="winTitle">Checkmate!</div>
      <div class="win-sub" id="winSub">White wins — well played!</div>
      <button id="playAgain">Play again</button>
    </div>
  </div>

  <div class="credit">Made with <span class="heart">❤</span> by GauravU</div>

<script>
/* ================= Refined/Optimized 2-player chess (single file) =================
   - hardware-accelerated transform animations via piecesLayer
   - only changed pieces are moved/updated (no full re-render each move)
   - full chess rules
   - promotion picker, check sound, checkmate popup + confetti
   - mobile touch support and animation lock
   - safe WebAudio tones (no external files)
*/

/* ---------------- constants ---------------- */
const EMPTY = "";
const initialFEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
const PIECE_TO_CHAR = { wK:"♔",wQ:"♕",wR:"♖",wB:"♗",wN:"♘",wP:"♙", bK:"♚",bQ:"♛",bR:"♜",bB:"♝",bN:"♞",bP:"♟" };
const KNIGHT_OFFS=[-17,-15,-10,-6,6,10,15,17];
const KING_OFFS=[-9,-8,-7,-1,1,7,8,9];

/* ---------------- helpers ---------------- */
function inBounds(i){ return Number.isFinite(i) && i>=0 && i<64; }
function sameRank(a,b){ return Math.floor(a/8)===Math.floor(b/8); }
function colorOf(p){ return p? p[0] : null; }
function clone(x){ return JSON.parse(JSON.stringify(x)); }
function algebraicToIndex(s){ if(!s||s.length<2) return null; const file="abcdefgh".indexOf(s[0]); const rank=Number(s[1]); if(file<0 || !rank) return null; return (8-rank)*8 + file; }

/* ---------------- parse FEN / model ---------------- */
function parseFEN(fen){
  const [placement, turn, castling, ep, halfmove, fullmove] = (fen||initialFEN).split(" ");
  const board = Array(64).fill(EMPTY);
  let i=0;
  for(const ch of placement){
    if(ch==="/") continue;
    if(/\d/.test(ch)){ i += Number(ch); continue; }
    const isW = ch === ch.toUpperCase();
    const map={K:"K",Q:"Q",R:"R",B:"B",N:"N",P:"P"};
    board[i++] = (isW? "w":"b") + map[ch.toUpperCase()];
  }
  return {
    board,
    turn: turn==="w"? "w":"b",
    castling: { wK:castling.includes("K"), wQ:castling.includes("Q"), bK:castling.includes("k"), bQ:castling.includes("q") },
    ep: ep==="-"? null : algebraicToIndex(ep),
    halfmove: Number(halfmove||0),
    fullmove: Number(fullmove||1),
    history: []
  };
}
let G = parseFEN(initialFEN);

/* ---------------- audio (safe WebAudio) ---------------- */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
try { actx = new AudioCtx(); } catch(e){ actx = null; }
function playTone(freq=440, dur=.08, type="sine", gain=.06, attack=0.005, release=0.04){
  if(!actx) return;
  try{
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    const now = actx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now+attack);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur+release);
    o.connect(g); g.connect(actx.destination); o.start(now); o.stop(now+dur+release+0.02);
  }catch(e){}
}
const SND = {
  select: ()=>playTone(560,.07,"sine",.07),
  move: ()=>{ playTone(340,.06,"triangle",.07); setTimeout(()=>playTone(580,.07,"sine",.06),64); },
  capture: ()=>{ playTone(240,.09,"square",.08); setTimeout(()=>playTone(190,.09,"square",.06),90); },
  illegal: ()=>playTone(110,.14,"sawtooth",.08),
  check: ()=>{ playTone(760,.09,"triangle",.09); setTimeout(()=>playTone(520,.12,"triangle",.09),60); setTimeout(()=>playTone(880,.18,"sine",.08),120); },
  gameEnd: ()=>{ playTone(523.25,.14,"sine",.08); setTimeout(()=>playTone(659.25,.16,"sine",.08),140); setTimeout(()=>playTone(783.99,.18,"triangle",.09),320); }
};

/* ---------------- DOM refs ---------------- */
const sqGrid = document.getElementById("sqGrid");
const piecesLayer = document.getElementById("piecesLayer");
const statusEl = document.getElementById("status");
const undoBtn = document.getElementById("undoBtn");
const restartBtn = document.getElementById("restartBtn");
const promoModal = document.getElementById("promoModal");
const promoGrid = document.getElementById("promoGrid");
const winModal = document.getElementById("winModal");
const winTitle = document.getElementById("winTitle");
const winSub = document.getElementById("winSub");
const playAgain = document.getElementById("playAgain");
const confettiEl = document.getElementById("confetti");

/* ---------------- draw grid (static) ---------------- */
function buildGrid(){
  sqGrid.innerHTML = "";
  for(let i=0;i<64;i++){
    const sq = document.createElement("div");
    sq.className = "sq " + (((Math.floor(i/8)+i)%2) ? "dark":"light");
    sq.dataset.idx = i;
    if(i%8===0){ const r = document.createElement("div"); r.className="label rank"; r.textContent = 8 - Math.floor(i/8); sq.appendChild(r); }
    if(Math.floor(i/8)===7){ const f = document.createElement("div"); f.className="label file"; f.textContent = "abcdefgh"[i%8]; sq.appendChild(f); }
    sqGrid.appendChild(sq);
  }
}
buildGrid();

/* ---------------- pieces mapping ---------------- */
/* pieceEls[idx] -> DOM element (or null) */
const pieceEls = new Array(64).fill(null);

/* get square rect relative to piecesLayer */
function sqRect(idx){
  const sq = document.querySelector(`.sq[data-idx="${idx}"]`);
  if(!sq) return null;
  const r = sq.getBoundingClientRect();
  const parent = piecesLayer.getBoundingClientRect();
  return { x: r.left - parent.left, y: r.top - parent.top, w: r.width, h: r.height };
}

/* create a piece element for index */
function createPieceEl(idx, piece){
  if(!inBounds(idx) || !piece) return null;
  const el = document.createElement("div");
  el.className = "piece " + (piece[0]==="w" ? "white" : "black");
  el.textContent = PIECE_TO_CHAR[piece] || "";
  el.dataset.idx = idx;
  piecesLayer.appendChild(el);
  pieceEls[idx] = el;
  snapPieceToSquare(idx);
  return el;
}

/* snap piece to its square without animation */
function snapPieceToSquare(idx){
  const el = pieceEls[idx];
  const rect = sqRect(idx);
  if(!el || !rect) return;
  el.style.transition = "none";
  el.style.width = (rect.w * 0.9) + "px";
  el.style.height = (rect.h * 0.9) + "px";
  el.style.left = (rect.x + rect.w*0.05) + "px";
  el.style.top = (rect.y + rect.h*0.05) + "px";
  el.style.transform = "translateZ(0)";
  void el.offsetWidth; // force reflow
  el.style.transition = "transform .22s cubic-bezier(.2,.9,.2,1), opacity .14s linear";
}

/* animate piece from -> to; resolves when animation done */
function animatePieceMove(from, to){
  return new Promise((resolve)=>{
    const el = pieceEls[from];
    if(!el){
      // fallback: no element (shouldn't happen) -> resolve
      resolve();
      return;
    }
    const rectTo = sqRect(to);
    if(!rectTo){
      // snap element mapping
      pieceEls[to] && piecesLayer.removeChild(pieceEls[to]);
      pieceEls[to] = el; pieceEls[from] = null; el.dataset.idx = to;
      snapPieceToSquare(to);
      resolve();
      return;
    }
    const current = el.getBoundingClientRect();
    const parentRect = piecesLayer.getBoundingClientRect();
    const fromX = current.left - parentRect.left;
    const fromY = current.top - parentRect.top;
    const toX = rectTo.x + rectTo.w*0.05;
    const toY = rectTo.y + rectTo.h*0.05;
    const dx = toX - fromX, dy = toY - fromY;
    // set element absolute position at current left/top then transform to target
    el.style.left = fromX + "px"; el.style.top = fromY + "px";
    // mark mapping early to avoid duplicates
    if(pieceEls[to] && pieceEls[to] !== el) removePieceEl(to);
    pieceEls[to] = el; pieceEls[from] = null; el.dataset.idx = to;
    // trigger transform
    requestAnimationFrame(()=> el.style.transform = `translate(${dx}px, ${dy}px)`);
    // cleanup handler: snap to final coords, reset transform
    const cleanup = ()=>{
      el.style.transition = "none";
      el.style.left = toX + "px"; el.style.top = toY + "px";
      el.style.transform = "translateZ(0)";
      void el.offsetWidth;
      el.style.transition = "transform .22s cubic-bezier(.2,.9,.2,1), opacity .14s linear";
      resolve();
    };
    el.addEventListener("transitionend", cleanup, {once:true});
    // safety
    setTimeout(()=>{ if(el) cleanup(); }, 600);
  });
}

/* remove piece element */
function removePieceEl(idx){
  const el = pieceEls[idx];
  if(!el) return;
  if(el.parentNode) el.parentNode.removeChild(el);
  pieceEls[idx] = null;
}

/* initial render of pieces */
function initialRender(){
  // remove any existing pieces
  for(let i=0;i<64;i++){ if(pieceEls[i]){ pieceEls[i].remove(); pieceEls[i] = null; } }
  for(let i=0;i<64;i++){
    const p = G.board[i];
    if(p) createPieceEl(i, p);
  }
}

/* ---------------- move generation & rules (robust) ---------------- */
function isSquareAttacked(pos, sq, byColor){
  if(!inBounds(sq)) return false;
  // pawns
  const offs = byColor==="w"? [-7,-9] : [7,9];
  for(const d of offs){
    const s = sq + d; if(!inBounds(s)) continue;
    if((d===-7||d===+9) && (s%8)===0) continue;
    if((d===-9||d===+7) && (s%8)===7) continue;
    if(pos.board[s] === byColor + "P") return true;
  }
  // knights
  for(const k of KNIGHT_OFFS){
    const s = sq + k; if(!inBounds(s)) continue;
    const df=Math.abs((s%8)-(sq%8)), dr=Math.abs(Math.floor(s/8)-Math.floor(sq/8));
    if(!((df===1&&dr===2)||(df===2&&dr===1))) continue;
    if(pos.board[s] === byColor + "N") return true;
  }
  // king
  for(const k of KING_OFFS){
    const s = sq + k; if(!inBounds(s)) continue;
    if(Math.abs((s%8)-(sq%8))>1) continue;
    if(pos.board[s] === byColor + "K") return true;
  }
  // bishops/queens diag
  for(const d of [-9,-7,7,9]){
    let s = sq + d;
    while(inBounds(s) && (Math.abs((s%8)-((s-d)%8))===1)){
      const pc = pos.board[s];
      if(pc){ if(colorOf(pc)===byColor && (pc[1]==="B"||pc[1]==="Q")) return true; break; }
      s += d;
    }
  }
  // rooks/queens straight
  for(const d of [-8,8,-1,1]){
    let s = sq + d;
    while(inBounds(s) && ((d===-1||d===1)? sameRank(s, s-d) : true)){
      const pc = pos.board[s];
      if(pc){ if(colorOf(pc)===byColor && (pc[1]==="R"||pc[1]==="Q")) return true; break; }
      s += d;
    }
  }
  return false;
}
function kingSquare(pos,color){ for(let i=0;i<64;i++) if(pos.board[i]===(color+"K")) return i; return -1; }

function genPseudoMoves(pos, from){
  const moves=[]; const piece = pos.board[from]; if(!piece) return moves;
  const color = piece[0], opp = color==="w"? "b":"w"; const type = piece[1];
  const push = (o)=> moves.push({...o, piece});
  if(type==="P"){
    const dir = color==="w"? -8 : +8;
    const startRank = color==="w"? 6:1;
    const promRank = color==="w"? 0:7;
    const one = from + dir;
    if(inBounds(one) && !pos.board[one]){
      if(Math.floor(one/8)===promRank){ ["Q","R","B","N"].forEach(pr=>push({from,to:one,flags:{promo:color+pr}})); }
      else push({from,to:one,flags:{}});
      if(Math.floor(from/8)===startRank){
        const two = from + dir*2; if(inBounds(two) && !pos.board[two]) push({from,to:two,flags:{double:true}});
      }
    }
    for(const d of [dir-1,dir+1]){
      const t = from + d; if(!inBounds(t)) continue;
      if(Math.abs((t%8)-(from%8))!==1) continue;
      if(pos.board[t] && colorOf(pos.board[t])===opp){
        if(Math.floor(t/8)===promRank){ ["Q","R","B","N"].forEach(pr=>push({from,to:t,flags:{promo:color+pr,capture:true}})); }
        else push({from,to:t,flags:{capture:true}});
      }
      if(pos.ep === t && !pos.board[t]) push({from,to:t,flags:{ep:true,capture:true}});
    }
  } else if(type==="N"){
    for(const k of KNIGHT_OFFS){
      const t = from + k; if(!inBounds(t)) continue;
      const df=Math.abs((t%8)-(from%8)), dr=Math.abs(Math.floor(t/8)-Math.floor(from/8));
      if(!((df===1&&dr===2)||(df===2&&dr===1))) continue;
      const pc = pos.board[t]; if(!pc || colorOf(pc)!==color) push({from,to:t,flags:{capture:!!pc}});
    }
  } else if(type==="B"||type==="R"||type==="Q"){
    const dirs = []; if(type!=="R") dirs.push(-9,-7,7,9); if(type!=="B") dirs.push(-8,8,-1,1);
    for(const d of dirs){
      let t = from + d;
      while(inBounds(t) && ((d===-1||d===1)? sameRank(t,t-d) : true)){
        const pc = pos.board[t];
        if(!pc) push({from,to:t,flags:{}});
        else{ if(colorOf(pc)!==color) push({from,to:t,flags:{capture:true}}); break; }
        t += d;
      }
    }
  } else if(type==="K"){
    for(const k of KING_OFFS){
      const t = from + k; if(!inBounds(t)) continue;
      if(Math.abs((t%8)-(from%8))>1) continue;
      const pc = pos.board[t]; if(!pc || colorOf(pc)!==color) push({from,to:t,flags:{capture:!!pc}});
    }
    const myK = kingSquare(pos,color);
    if(myK===(color==="w"?60:4)){
      const oppc=color==="w"?"b":"w";
      const empty=i=>!pos.board[i]; const unsafe=i=>isSquareAttacked(pos,i,oppc);
      if(color==="w"){
        if(pos.castling.wK && empty(61)&&empty(62)&&!unsafe(60)&&!unsafe(61)&&!unsafe(62)) push({from:60,to:62,flags:{castle:"K"}});
        if(pos.castling.wQ && empty(59)&&empty(58)&&empty(57)&&!unsafe(60)&&!unsafe(59)&&!unsafe(58)) push({from:60,to:58,flags:{castle:"Q"}});
      }else{
        if(pos.castling.bK && empty(5)&&empty(6)&&!unsafe(4)&&!unsafe(5)&&!unsafe(6)) push({from:4,to:6,flags:{castle:"K"}});
        if(pos.castling.bQ && empty(3)&&empty(2)&&empty(1)&&!unsafe(4)&&!unsafe(3)&&!unsafe(2)) push({from:4,to:2,flags:{castle:"Q"}});
      }
    }
  }
  return moves;
}

function makeMove(pos,mv){
  const np = clone(pos);
  const {from,to,flags={}} = mv;
  const moving = np.board[from];
  np.history.push({ board: clone(np.board), castling: clone(np.castling), ep: np.ep, halfmove: np.halfmove, fullmove: np.fullmove });
  np.ep = null;
  if(moving[1]==="P" || flags.capture) np.halfmove = 0; else np.halfmove++;
  if(np.turn==="b") np.fullmove++;
  if(flags.ep){
    const dir = (np.turn==="w")? -8 : +8;
    np.board[to] = moving; np.board[from] = EMPTY; np.board[to - dir] = EMPTY;
  } else if(flags.castle){
    np.board[to] = moving; np.board[from] = EMPTY;
    if(flags.castle==="K"){
      if(np.turn==="w"){ np.board[63]=EMPTY; np.board[61]="wR"; }
      else{ np.board[7]=EMPTY; np.board[5]="bR"; }
    }else{
      if(np.turn==="w"){ np.board[56]=EMPTY; np.board[59]="wR"; }
      else{ np.board[0]=EMPTY; np.board[3]="bR"; }
    }
  } else {
    np.board[to] = moving; np.board[from] = EMPTY;
  }
  if(flags.promo){ np.board[to] = flags.promo; }
  if(flags.double){ np.ep = Math.floor((from + to)/2); }
  function revoke(c,s){ const k = c + s; if(np.castling[k]) np.castling[k] = false; }
  if(moving==="wK"){ revoke("w","K"); revoke("w","Q"); }
  if(moving==="bK"){ revoke("b","K"); revoke("b","Q"); }
  if(from===63||to===63) revoke("w","K");
  if(from===56||to===56) revoke("w","Q");
  if(from===7 ||to===7 ) revoke("b","K");
  if(from===0 ||to===0 ) revoke("b","Q");
  np.turn = (np.turn==="w")? "b":"w";
  return np;
}

function legalMovesFrom(pos, from){
  const me = colorOf(pos.board[from]); if(!me || me!==pos.turn) return [];
  const pseudo = genPseudoMoves(pos,from), out=[];
  for(const mv of pseudo){
    const nx = makeMove(pos,mv);
    const ks = kingSquare(nx,me);
    if(!isSquareAttacked(nx,ks, me==="w"?"b":"w")) out.push(mv);
  }
  return out;
}
function allLegalMoves(pos){ const r=[]; for(let i=0;i<64;i++) if(pos.board[i] && colorOf(pos.board[i])===pos.turn) r.push(...legalMovesFrom(pos,i)); return r; }
function inCheck(pos,c){ const ks = kingSquare(pos,c); return isSquareAttacked(pos,ks,c==="w"?"b":"w"); }
function gameState(pos){ const moves = allLegalMoves(pos); if(moves.length===0){ if(inCheck(pos,pos.turn)) return {ended:true,result:pos.turn==="w"?"0-1":"1-0",reason:"checkmate"} return {ended:true,result:"½-½",reason:"stalemate"} } return {ended:false}; }

/* ---------------- interaction state ---------------- */
let selected = null;
let cachedMoves = [];
let animLock = false;
let gameOver = false;
let lastMove = null;

/* ---------------- UI helpers ---------------- */
function clearHighlights(){ document.querySelectorAll(".sq").forEach(sq=>{ sq.classList.remove("sel","hint","capture","last-move") }); }
function showHints(moves){ moves.forEach(m=>{ const el = document.querySelector(`.sq[data-idx="${m.to}"]`); if(el) el.classList.add(m.flags && m.flags.capture ? "capture":"hint"); }); }
function markLastMove(from,to){ document.querySelectorAll(".sq").forEach(sq=>sq.classList.remove("last-move")); const a=document.querySelector(`.sq[data-idx="${from}"]`); const b=document.querySelector(`.sq[data-idx="${to}"]`); if(a) a.classList.add("last-move"); if(b) b.classList.add("last-move"); }
function updateStatus(){
  const st = gameState(G);
  if(st.ended){
    statusEl.textContent = st.reason==="checkmate" ? `Checkmate • ${G.turn==="w"?"Black":"White"} wins` : `Stalemate • Draw`;
    gameOver = true;
    return;
  }
  const chk = inCheck(G,G.turn) ? " • Check!" : "";
  statusEl.textContent = `${G.turn==="w"?"White":"Black"} to move${chk}`;
}

/* ---------------- selection & move attempt ---------------- */
function selectSquare(idx){
  if(gameOver || animLock) return;
  const piece = G.board[idx];
  if(!piece || colorOf(piece)!==G.turn){
    if(selected === null){ SND.illegal(); return; }
    clearHighlights(); selected = null; cachedMoves = []; return;
  }
  selected = idx;
  cachedMoves = legalMovesFrom(G, idx);
  clearHighlights();
  const el = document.querySelector(`.sq[data-idx="${idx}"]`); if(el) el.classList.add("sel");
  showHints(cachedMoves);
  SND.select();
}

async function tryMove(toIdx){
  if(gameOver || animLock || selected === null) return;
  const mv = cachedMoves.find(m=>m.to === toIdx);
  if(!mv){
    const t = G.board[toIdx];
    if(t && colorOf(t)===G.turn){ selectSquare(toIdx); return; }
    SND.illegal(); return;
  }
  // promotion: open modal if needed
  if(mv.flags && mv.flags.promo){
    openPromotionPicker(mv);
    return;
  }
  const wasCapture = !!(mv.flags && mv.flags.capture);
  const movingPiece = G.board[mv.from];
  const glyph = PIECE_TO_CHAR[movingPiece];
  animLock = true;

  // prepare captured piece fade
  if(wasCapture && !mv.flags.ep){
    const capEl = pieceEls[mv.to];
    if(capEl) { capEl.style.opacity = ".06"; capEl.style.transform = "scale(.92)"; }
  }
  // animate piece move
  await animatePieceMove(mv.from, mv.to);

  // handle en-passant removal
  if(mv.flags && mv.flags.ep){
    const dir = (G.turn === "w") ? -8 : 8;
    const capIdx = mv.to - dir;
    removePieceEl(capIdx);
  } else if(wasCapture){
    // remove captured element if still present (it may have been replaced by moving piece)
    // after animate, ensure no duplicate
    if(pieceEls[mv.to] && pieceEls[mv.to].dataset.idx != mv.to) removePieceEl(mv.to);
  }

  // commit state
  G = makeMove(G, mv);

  // if promotion piece already chosen (none here), update glyph of resulting piece
  if(mv.flags && mv.flags.promo){
    const el = pieceEls[mv.to];
    if(el){
      el.textContent = PIECE_TO_CHAR[mv.flags.promo] || el.textContent;
      if(mv.flags.promo[0]==="w"){ el.classList.remove("black"); el.classList.add("white"); }
      else { el.classList.remove("white"); el.classList.add("black"); }
    }
  }

  lastMove = { from: mv.from, to: mv.to };
  markLastMove(mv.from, mv.to);
  clearHighlights();
  selected = null;
  cachedMoves = [];
  animLock = false;

  // update status and sounds
  const st = gameState(G);
  updateStatus();
  if(st.ended){
    SND.gameEnd();
    showWin(st);
  } else {
    if(inCheck(G,G.turn)) SND.check();
    else if(wasCapture) SND.capture();
    else SND.move();
  }
}

/* ---------------- promotion picker ---------------- */
function openPromotionPicker(mvBase){
  promoGrid.innerHTML = "";
  const color = (mvBase.piece ? mvBase.piece[0] : (G.board[mvBase.from] ? G.board[mvBase.from][0] : "w"));
  const opts = ["Q","R","B","N"].map(x => color + x);
  opts.forEach(p=>{
    const btn = document.createElement("button");
    btn.className = "promo-btn";
    btn.innerHTML = `<div style="font-size:24px">${PIECE_TO_CHAR[p]}</div>`;
    btn.addEventListener("click", ()=>{
      // apply selected promotion
      const mv = clone(mvBase);
      mv.flags = {...mv.flags, promo: p};
      promoModal.classList.remove("open");
      // animate then commit
      (async ()=>{
        animLock = true;
        // pre-fade capture if needed
        if(mv.flags && mv.flags.capture && !mv.flags.ep){
          const capEl = pieceEls[mv.to];
          if(capEl){ capEl.style.opacity = ".06"; capEl.style.transform = "scale(.92)"; }
        }
        await animatePieceMove(mv.from, mv.to);
        if(mv.flags && mv.flags.ep){
          const dir = (G.turn==="w")? -8:8;
          removePieceEl(mv.to - dir);
        }
        G = makeMove(G,mv);
        // update promoted piece glyph
        const el = pieceEls[mv.to];
        if(el){ el.textContent = PIECE_TO_CHAR[mv.flags.promo] || el.textContent; if(mv.flags.promo[0]==="w"){ el.classList.add("white"); el.classList.remove("black"); } else { el.classList.add("black"); el.classList.remove("white"); } }
        animLock = false;
        updateStatus();
        const st = gameState(G);
        if(st.ended){ SND.gameEnd(); showWin(st); } else { if(inCheck(G,G.turn)) SND.check(); else SND.move(); }
      })();
    });
    promoGrid.appendChild(btn);
  });
  promoModal.classList.add("open");
}
function closePromotion(){ promoModal.classList.remove("open"); }

/* ---------------- win popup & confetti ---------------- */
function showWin(st){
  const winner = (st.result==="1-0")? "White" : (st.result==="0-1")? "Black" : "Draw";
  winTitle.textContent = st.reason==="checkmate" ? "Checkmate!" : "Game Over";
  winSub.textContent = st.reason==="checkmate" ? `${winner} wins — well played!` : "Stalemate — game drawn.";
  winModal.classList.add("open");
  burstConfetti();
}
function hideWin(){ winModal.classList.remove("open"); confettiEl.innerHTML = ""; }
playAgain.addEventListener("click", ()=>{
  hideWin();
  G = parseFEN(initialFEN);
  initialRender();
  clearHighlights();
  updateStatus();
  gameOver = false;
});
winModal.addEventListener("click",(e)=>{ if(e.target === winModal) hideWin(); });

function burstConfetti(){
  confettiEl.innerHTML = "";
  const icons=["🟡","🟣","🟠","🟢","🔵","🔴","⭐","✨","💠"];
  const n = 36;
  for(let i=0;i<n;i++){
    const s = document.createElement("span");
    s.textContent = icons[(Math.floor(Math.random()*icons.length))];
    s.style.position = "absolute";
    s.style.left = (Math.random()*100) + "%";
    s.style.top = "-8vh";
    s.style.opacity = .8 + Math.random()*.2;
    s.style.fontSize = (12 + Math.random()*18) + "px";
    const dur = (1.2 + Math.random()*1.6) + "s";
    s.style.animation = `fall ${dur} linear forwards`;
    s.style.transform = `rotate(${Math.random()*360}deg)`;
    confettiEl.appendChild(s);
  }
}
/* confetti animation keyframes injection */
const css = `@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity:.95; } }`;
const style = document.createElement("style"); style.appendChild(document.createTextNode(css)); document.head.appendChild(style);

/* ---------------- events (click & touch) ---------------- */
sqGrid.addEventListener("click",(e)=>{
  if(animLock) return;
  const sq = e.target.closest(".sq"); if(!sq) return;
  const idx = Number(sq.dataset.idx);
  if(selected === null) selectSquare(idx); else tryMove(idx);
});
sqGrid.addEventListener("touchstart",(e)=>{
  if(animLock) return;
  const t = e.touches && e.touches[0]; if(!t) return;
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const sq = el && el.closest && el.closest(".sq"); if(!sq) return;
  e.preventDefault();
  const idx = Number(sq.dataset.idx);
  if(selected === null) selectSquare(idx); else tryMove(idx);
},{passive:false});

document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ selected=null; cachedMoves=[]; clearHighlights(); } });
promoModal.addEventListener("click",(e)=>{ if(e.target===promoModal) closePromotion(); });

undoBtn.addEventListener("click", ()=>{
  if(animLock || !G.history.length) { SND.illegal(); return; }
  const prev = G.history.pop();
  G.board = prev.board; G.castling = prev.castling; G.ep = prev.ep; G.halfmove = prev.halfmove; G.fullmove = prev.fullmove;
  G.turn = (G.turn==="w")? "b":"w";
  initialRender();
  clearHighlights();
  updateStatus();
});
restartBtn.addEventListener("click", ()=>{
  hideWin();
  G = parseFEN(initialFEN);
  initialRender();
  clearHighlights();
  updateStatus();
  gameOver = false;
});

/* ---------------- init ---------------- */
initialRender();
updateStatus();

/* ================= End of file ================= */
</script>
